<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


  
<title>Free EMI Calculator Online | Loan EMI Calculator India</title>

<meta name="description" content="Calculate your EMI instantly with our free EMI calculator. Compare loans, view charts, and download schedules easily.">

<meta name="keywords" content="EMI calculator, loan EMI calculator India, home loan EMI, personal loan calculator">

<meta name="author" content="Tanishka">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<meta property="og:title" content="Free EMI Calculator">
<meta property="og:description" content="Calculate EMI with charts and comparison tools">
<meta property="og:url" content="https://tanishkacsi751-hash.github.io/emi-calculator-csi/">
<meta property="og:type" content="website">

  
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{background:#eef2f7;font-family:sans-serif}
.card{border-radius:20px;box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.result-box{background:#e6fffa;border-radius:10px;padding:15px}
.loan-img{border-radius:15px;height:150px;object-fit:cover;width:100%}
</style>
</head>
<body>

<div class="container py-4">
<div class="card p-4">
<h4 class="text-center mb-3">📱 EMI Calculator</h4>

<div class="row mb-4">
<div class="col-md-4"><img src="mortgages-loan-finance-real-estate-remixed-media.jpg" class="loan-img"></div>
<div class="col-md-4"><img src="tree-grows-coin-glass-jar-with-copy-space.jpg" class="loan-img"></div>
<div class="col-md-4"><img src="young-happy-couple-having-consultations-with-bank-manager-meeting-office.jpg" class="loan-img"></div>
</div>

<div class="mb-3">
<label>Loan Amount (₹)</label>
<input type="number" id="amountInput" class="form-control mb-2" value="500000">
<input type="range" id="amount" class="form-range" min="10000" max="5000000" step="10000" value="500000">
</div>

<div class="mb-3">
<label>Interest Rate (%)</label>
<input type="number" id="rateInput" class="form-control mb-2" value="8">
<input type="range" id="rate" class="form-range" min="1" max="20" step="0.1" value="8">
</div>

<div class="mb-3">
<label>Tenure (Years)</label>
<input type="number" id="yearsInput" class="form-control mb-2" value="5">
<input type="range" id="years" class="form-range" min="1" max="30" value="5">
</div>

<div class="text-center mb-3">
<button class="btn btn-primary" id="calculate">Calculate</button>
<button class="btn btn-secondary" id="reset">Reset</button>
</div>

<div class="result-box d-none" id="result">
<p><b>EMI:</b> ₹ <span id="emi"></span></p>
<p><b>Total Interest:</b> ₹ <span id="interest"></span></p>
<p><b>Total Payment:</b> ₹ <span id="total"></span></p>
</div>

<canvas id="emiChart" class="mt-4"></canvas>

</div>
</div>

<script>
$(document).ready(function(){

let scheduleData = [];
let chart;
let compareCount = 1;

function calcEMI(P,r,n){
return (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}

$('#amount').on('input', function(){ $('#amountInput').val(this.value); });
$('#rate').on('input', function(){ $('#rateInput').val(this.value); });
$('#years').on('input', function(){ $('#yearsInput').val(this.value); });

$('#amountInput').on('input', function(){ $('#amount').val(this.value); });
$('#rateInput').on('input', function(){ $('#rate').val(this.value); });
$('#yearsInput').on('input', function(){ $('#years').val(this.value); });

$('#calculate').click(function(){
let P = +$('#amountInput').val();
let rate = +$('#rateInput').val();
let years = +$('#yearsInput').val();

if(!P || !rate || !years){ alert('Enter all values'); return; }

let r = rate/12/100;
let n = years*12;
let emi = calcEMI(P,r,n);
let total = emi*n;
let interest = total-P;

$('#emi').text(emi.toFixed(2));
$('#interest').text(interest.toFixed(2));
$('#total').text(total.toFixed(2));
$('#result').removeClass('d-none');

if(chart) chart.destroy();
chart = new Chart(document.getElementById('emiChart'),{
type:'doughnut',
data:{labels:['Principal','Interest'],datasets:[{data:[P,interest]}]}
});

scheduleData=[];
let balance=P;
for(let i=1;i<=n;i++){
let int = balance*r;
let princ = emi-int;
balance-=princ;
scheduleData.push({Month:i,Principal:princ,Interest:int,Balance:balance});
}
});

$('#exportExcel').click(function(){
if(scheduleData.length === 0){ alert('Please calculate EMI first'); return; }
let ws = XLSX.utils.json_to_sheet(scheduleData);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Schedule");
XLSX.writeFile(wb, "emi_schedule.xlsx");
});

$('#exportPDF').click(function(){
if(scheduleData.length === 0){ alert('Please calculate EMI first'); return; }
const { jsPDF } = window.jspdf;
let doc = new jsPDF();
doc.text("EMI Schedule",10,10);
let y=20;
scheduleData.slice(0,30).forEach(r=>{
doc.text(`${r.Month} | ${r.Principal.toFixed(0)} | ${r.Interest.toFixed(0)}`,10,y);
y+=6;
});
doc.save("emi.pdf");
});

$('#addCompare').click(function(){
let emi=$('#emi').text();
let interest=$('#interest').text();
if(!emi) return alert('Calculate first');
$('#compareTable').append(`<tr><td>Loan ${compareCount++}</td><td>${emi}</td><td>${interest}</td></tr>`);
});

$('#reset').click(function(){ location.reload(); });

});
</script>

</body>
</html>
